services:
  postgres:
    container_name: postgres_backtesting
    build:
      context: ../
      dockerfile: infra/postgres/Dockerfile
    volumes:
        - postgres:/var/lib/postgresql/data
    ports: 
      - "5432:5432"
    env_file: ../.env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}




volumes:
  postgres:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA}